<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Prices</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f5f5f5;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #007BFF;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h2>Stock Prices Table</h2>

    <div class="container">
        <table>
            <thead>
                <tr>
<!--                    <th>ID</th>-->
                    <th>Sl No</th>
                    <th>Brand Category</th>
                    <th>Brand</th>
                    <th>Size (ML)</th>
<!--                    <th>Look Column</th>-->
                    <th>Price per Bottle</th>
<!--                    <th>Old Price per Bottle</th>-->
                    <th>Price per Case</th>
                </tr>
            </thead>
            <tbody>
                {% for item in stock_prices %}
                <tr>
<!--                    <td>{{ item._id }}</td>-->
                    <td>{{ item.Sl_No }}</td>
                    <td>{{ item.Brand_Category }}</td>
                    <td>{{ item.Brand }}</td>
                    <td>{{ item.Size_ML }}</td>
<!--                    <td>{{ item.LookColumn }}</td>-->
                    <td>{{ item.Maximum_Retail_Price_per_bottle }}</td>
<!--                    <td>{{ item.Maximum_Retail_Price_per_bottle_OLD }}</td>-->
                    <td>{{ item.Maximum_Retail_Price_per_case }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
