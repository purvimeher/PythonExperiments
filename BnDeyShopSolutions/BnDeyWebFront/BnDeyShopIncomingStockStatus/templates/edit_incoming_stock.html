<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Incoming Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h2 class="mb-4">Edit Incoming Stock Record</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <form method="POST">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Brand Category</label>
                        <input type="text" name="Brand_Category" class="form-control" value="{{ record.Brand_Category }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Brand</label>
                        <input type="text" name="Brand" class="form-control" value="{{ record.Brand }}" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Size_ML</label>
                        <input type="number" name="Size_ML" class="form-control" value="{{ record.Size_ML }}" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Qty</label>
                        <input type="number" name="Qty" class="form-control" value="{{ record.Qty }}" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Date</label>
                        <input type="text" name="Date" class="form-control" value="{{ record.Date }}" required>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Update Record</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
